name: Build macOS Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    
    steps:
      - name: Checkout vial-effects
        uses: actions/checkout@v4
        
      - name: Clone JUCE
        run: |
          mkdir -p third_party
          cd third_party
          git clone --depth 1 https://github.com/juce-framework/JUCE.git
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build web UI
        run: |
          cd ui
          npm ci
          npm run build
          
      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          
      - name: Build plugin
        run: cmake --build build
        
      - name: Create .pkg installer
        run: |
          VERSION=$(sed -n 's/.*project(VialEffects VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)

          # Stage files under a directory tree mirroring the install locations
          mkdir -p pkg_root/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg_root/Library/Audio/Plug-Ins/Components
          mkdir -p pkg_root/Applications
          
          # Copy VST3
          if [ -d "build/VialEffects_artefacts/Release/VST3/Vial Effects.vst3" ]; then
            cp -R "build/VialEffects_artefacts/Release/VST3/Vial Effects.vst3" \
              "pkg_root/Library/Audio/Plug-Ins/VST3/"
          fi
          
          # Copy AU
          if [ -d "build/VialEffects_artefacts/Release/AU/Vial Effects.component" ]; then
            cp -R "build/VialEffects_artefacts/Release/AU/Vial Effects.component" \
              "pkg_root/Library/Audio/Plug-Ins/Components/"
          fi
          
          # Copy Standalone
          if [ -d "build/VialEffects_artefacts/Release/Standalone/Vial Effects.app" ]; then
            cp -R "build/VialEffects_artefacts/Release/Standalone/Vial Effects.app" \
              "pkg_root/Applications/"
          fi
          
          mkdir -p build/installer
          pkgbuild --root pkg_root \
            --identifier com.buchenberg.vialeffects \
            --version "${VERSION}" \
            --install-location / \
            "build/installer/VialEffects-${VERSION}-macOS.pkg"
          
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VialEffects-macOS-Installer
          path: build/installer/VialEffects-*-macOS.pkg
          retention-days: 30

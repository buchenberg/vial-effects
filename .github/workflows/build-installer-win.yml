name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    
    steps:
      - name: Checkout vial-effects
        uses: actions/checkout@v4
        
      - name: Clone JUCE
        run: |
          mkdir -p third_party
          cd third_party
          git clone --depth 1 https://github.com/juce-framework/JUCE.git
          
      - name: Verify JUCE checkout
        run: ls -la third_party/JUCE
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build web UI
        run: |
          cd ui
          npm install
          npm run build
          
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
          
      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download WebView2 NuGet package
        run: |
          mkdir -p third_party/webview2
          curl -L -o third_party/webview2/webview2.nupkg \
            "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.3485.44"
          cd third_party/webview2
          unzip -o webview2.nupkg
          
      - name: Configure CMake
        run: |
          WEBVIEW2_DIR="$(echo "$GITHUB_WORKSPACE" | sed 's|\\|/|g')/third_party/webview2"
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl \
                -DWebView2_ROOT="$WEBVIEW2_DIR"
                
      - name: Build plugin
        run: cmake --build build
        
      - name: Build installer
        run: |
          "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" \
            /DConfiguration=Release \
            /O"build/installer/" \
            installer/VialEffects.iss
            
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VialEffects-Installer
          path: build/installer/VialEffects-*-win64.exe
          retention-days: 30
